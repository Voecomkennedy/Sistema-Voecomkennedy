<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Finance Control | Mais Voo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 50:'#f0f4f8',100:'#d9e2ec',200:'#bcccdc',300:'#9fb3c8',400:'#829ab1',500:'#627d98',600:'#486581',700:'#334e68',800:'#243b53',900:'#102a43',950:'#0a1929' },
                        gold: { 400:'#f6c744',500:'#d4a012',600:'#b8860b' },
                        royal: { 500:'#4169e1',600:'#3457c9' }
                    }
                }
            }
        }
    </script>
    <style>
        *{font-family:'Inter',sans-serif}
        .gradient-navy{background:linear-gradient(135deg,#102a43 0%,#243b53 100%)}
        .gradient-royal{background:linear-gradient(135deg,#4169e1 0%,#3457c9 100%)}
        .gradient-gold{background:linear-gradient(135deg,#f6c744 0%,#d4a012 100%)}
        .glass-card{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2)}
        .input-premium:focus{box-shadow:0 0 0 3px rgba(65,105,225,0.2)}
        .btn-premium:hover{transform:translateY(-2px)}
        .card-hover:hover{transform:translateY(-4px);box-shadow:0 20px 40px -10px rgba(0,0,0,0.15)}
        .fade-in{animation:fadeIn 0.5s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .slide-in{animation:slideIn 0.3s ease-out}
        @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
        .table-row-hover:hover{background:linear-gradient(90deg,rgba(65,105,225,0.05) 0%,rgba(65,105,225,0.02) 100%)}
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app"></div>
    <script type="text/babel">
        const {useState,useEffect,useMemo,useRef}=React;

        const Icon=({name,size=24,className=""})=>{
            const icons={
                plane:<path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>,
                planeTakeoff:<><path d="M2 22h20"/><path d="M6.36 17.4 4 17l-2-4 1.1-.55a2 2 0 0 1 1.8 0l.17.1a2 2 0 0 0 1.8 0L8 12 5 6l.9-.45a2 2 0 0 1 2.09.2l4.02 3a2 2 0 0 0 2.1.2l4.19-2.06a2.41 2.41 0 0 1 1.73-.17L21 7a1.4 1.4 0 0 1 .87 1.99l-.38.76c-.23.46-.6.84-1.07 1.08L7.58 17.2a2 2 0 0 1-1.22.18Z"/></>,
                dashboard:<><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></>,
                wallet:<><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></>,
                banknote:<><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></>,
                trendingUp:<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
                trendingDown:<><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></>,
                clock:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                user:<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                users:<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                briefcase:<><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
                building:<><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/></>,
                calculator:<><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></>,
                creditCard:<><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></>,
                check:<polyline points="20 6 9 17 4 12"/>,
                checkCircle:<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                alertCircle:<><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
                info:<><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></>,
                search:<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                filter:<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>,
                pencil:<><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></>,
                trash:<><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                inbox:<><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></>,
                receipt:<><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8M12 17.5v-11"/></>,
                piggyBank:<><path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 1.8 0 3 2 4.5V20h4v-2h3v2h4v-4c1-.5 1.7-1 2-2h2v-4h-2c0-1-.5-1.5-1-2V5z"/><path d="M2 9v1c0 1.1.9 2 2 2h1M16 11h.01"/></>,
                chevronDown:<path d="m6 9 6 6 6-6"/>,
                download:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
                upload:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
                save:<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
                hardDrive:<><line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/></>,
                database:<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></>,
                refreshCw:<><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
                shield:<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></>,
                folderOpen:<><path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></>
            };
            return(
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const Button=({children,variant='primary',size='md',icon,onClick,className='',disabled=false,type='button'})=>{
            const v={primary:'gradient-royal text-white hover:shadow-lg',secondary:'bg-white text-navy-800 border border-navy-200 hover:border-royal-500 hover:text-royal-500',success:'bg-gradient-to-r from-emerald-500 to-emerald-600 text-white',danger:'bg-gradient-to-r from-red-500 to-red-600 text-white',warning:'bg-gradient-to-r from-amber-500 to-amber-600 text-white'};
            const s={sm:'px-3 py-1.5 text-sm',md:'px-5 py-2.5 text-sm',lg:'px-6 py-3 text-base'};
            return(<button type={type} onClick={onClick} disabled={disabled} className={`btn-premium inline-flex items-center justify-center gap-2 font-semibold rounded-xl shadow-md transition-all duration-300 ${v[variant]} ${s[size]} ${disabled?'opacity-50 cursor-not-allowed':''} ${className}`}>{icon&&<Icon name={icon} size={size==='sm'?16:18}/>}{children}</button>);
        };

        const Input=({label,type='text',value,onChange,placeholder,prefix,required=false,className='',min})=>(
            <div className={`space-y-1.5 ${className}`}>
                {label&&<label className="block text-sm font-medium text-navy-700">{label}{required&&<span className="text-red-500 ml-1">*</span>}</label>}
                <div className="relative">
                    {prefix&&<div className="absolute left-3 top-1/2 -translate-y-1/2 text-navy-500 font-medium text-sm">{prefix}</div>}
                    <input type={type} value={value} onChange={onChange} placeholder={placeholder} min={min} className={`input-premium w-full px-4 py-3 bg-white border border-navy-200 rounded-xl text-navy-800 placeholder-navy-400 focus:outline-none focus:border-royal-500 transition-all duration-300 ${prefix?'pl-12':''}`}/>
                </div>
            </div>
        );

        const Select=({label,value,onChange,options,required=false,className=''})=>(
            <div className={`space-y-1.5 ${className}`}>
                {label&&<label className="block text-sm font-medium text-navy-700">{label}{required&&<span className="text-red-500 ml-1">*</span>}</label>}
                <div className="relative">
                    <select value={value} onChange={onChange} className="input-premium w-full px-4 py-3 bg-white border border-navy-200 rounded-xl text-navy-800 focus:outline-none focus:border-royal-500 appearance-none cursor-pointer transition-all duration-300">
                        {options.map(opt=>(<option key={opt.value} value={opt.value}>{opt.label}</option>))}
                    </select>
                    <div className="absolute right-3 top-1/2 -translate-y-1/2 text-navy-400 pointer-events-none"><Icon name="chevronDown" size={20}/></div>
                </div>
            </div>
        );

        const Card=({children,className='',hover=false})=>(<div className={`glass-card rounded-2xl shadow-lg ${hover?'card-hover transition-all duration-300':''} ${className}`}>{children}</div>);

        const Badge=({status})=>{
            const styles={'Pago':'bg-emerald-100 text-emerald-700 border-emerald-200','Pendente':'bg-amber-100 text-amber-700 border-amber-200','Cancelado':'bg-red-100 text-red-700 border-red-200'};
            return(<span className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold border ${styles[status]||styles['Pendente']}`}>{status}</span>);
        };

        const KPICard=({title,value,icon,trend,trendValue,color='royal'})=>{
            const colors={royal:'from-royal-500 to-royal-600',emerald:'from-emerald-500 to-emerald-600',amber:'from-amber-500 to-amber-600'};
            return(
                <Card hover className="p-6 overflow-hidden relative">
                    <div className={`absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${colors[color]} opacity-10 rounded-full -translate-y-1/2 translate-x-1/2`}></div>
                    <div className="flex items-start justify-between relative z-10">
                        <div>
                            <p className="text-sm font-medium text-navy-500 mb-1">{title}</p>
                            <p className="text-3xl font-bold text-navy-900">{value}</p>
                            {trend&&<div className={`flex items-center gap-1 mt-2 text-sm ${trend==='up'?'text-emerald-600':'text-red-500'}`}><Icon name={trend==='up'?'trendingUp':'trendingDown'} size={16}/><span className="font-medium">{trendValue}</span></div>}
                        </div>
                        <div className={`p-3 rounded-xl bg-gradient-to-br ${colors[color]} shadow-lg`}><Icon name={icon} size={24} className="text-white"/></div>
                    </div>
                </Card>
            );
        };

        const Sidebar=({currentPage,setCurrentPage})=>{
            const menuItems=[
                {id:'dashboard',label:'Dashboard',icon:'dashboard'},
                {id:'nova-emissao',label:'Nova Emissao',icon:'planeTakeoff'},
                {id:'financeiro',label:'Financeiro',icon:'wallet'},
                {id:'backup',label:'Backup',icon:'database'}
            ];
            return(
                <aside className="fixed left-0 top-0 h-full w-64 gradient-navy p-6 flex flex-col z-50">
                    <div className="flex items-center gap-3 mb-10">
                        <div className="w-10 h-10 rounded-xl gradient-gold flex items-center justify-center shadow-lg"><Icon name="plane" size={20} className="text-navy-900"/></div>
                        <div><h1 className="text-white font-bold text-lg leading-tight">Flight Finance</h1><p className="text-navy-400 text-xs">Control System</p></div>
                    </div>
                    <nav className="flex-1 space-y-2">
                        {menuItems.map(item=>(
                            <button key={item.id} onClick={()=>setCurrentPage(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage===item.id?'bg-white/10 text-white shadow-lg':'text-navy-300 hover:bg-white/5 hover:text-white'}`}>
                                <Icon name={item.icon} size={20}/><span className="font-medium">{item.label}</span>{currentPage===item.id&&<div className="ml-auto w-1.5 h-1.5 rounded-full bg-gold-400"></div>}
                            </button>
                        ))}
                    </nav>
                    <div className="pt-6 border-t border-navy-700">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-royal-500 flex items-center justify-center text-white font-bold">K</div>
                            <div><p className="text-white font-medium text-sm">Kennedy</p><p className="text-navy-400 text-xs">Mais Voo</p></div>
                        </div>
                    </div>
                </aside>
            );
        };

        const Dashboard=({emissoes})=>{
            const stats=useMemo(()=>{
                const totalVendido=emissoes.reduce((acc,e)=>acc+(parseFloat(e.valorVenda)||0),0);
                const totalLucro=emissoes.reduce((acc,e)=>acc+(parseFloat(e.lucro)||0),0);
                const contasReceber=emissoes.filter(e=>e.statusPagamento==='Pendente').reduce((acc,e)=>acc+(parseFloat(e.valorVenda)||0),0);
                const totalPassageiros=emissoes.reduce((acc,e)=>acc+(parseInt(e.qtdPassageiros)||0),0);
                return{totalVendido,totalLucro,contasReceber,totalPassageiros};
            },[emissoes]);
            const formatCurrency=(value)=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(value);
            return(
                <div className="fade-in">
                    <div className="mb-8"><h2 className="text-2xl font-bold text-navy-900">Dashboard</h2><p className="text-navy-500 mt-1">Visao geral do seu negocio</p></div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <KPICard title="Total Vendido" value={formatCurrency(stats.totalVendido)} icon="banknote" trend="up" trendValue="+12.5%" color="royal"/>
                        <KPICard title="Lucro Total" value={formatCurrency(stats.totalLucro)} icon="trendingUp" trend="up" trendValue="+8.2%" color="emerald"/>
                        <KPICard title="Contas a Receber" value={formatCurrency(stats.contasReceber)} icon="clock" color="amber"/>
                        <KPICard title="Passageiros" value={stats.totalPassageiros} icon="users" color="royal"/>
                    </div>
                    <Card className="p-6">
                        <div className="flex items-center justify-between mb-6">
                            <div><h3 className="text-lg font-semibold text-navy-900">Ultimas Emissoes</h3><p className="text-sm text-navy-500">Suas vendas mais recentes</p></div>
                            <Button variant="secondary" size="sm" icon="filter">Filtrar</Button>
                        </div>
                        {emissoes.length===0?(
                            <div className="text-center py-12">
                                <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-navy-100 flex items-center justify-center"><Icon name="plane" size={32} className="text-navy-400"/></div>
                                <p className="text-navy-500 font-medium">Nenhuma emissao registrada</p><p className="text-navy-400 text-sm mt-1">Comece adicionando sua primeira venda</p>
                            </div>
                        ):(
                            <div className="space-y-3">
                                {emissoes.slice(-5).reverse().map((emissao,index)=>(
                                    <div key={index} className="flex items-center justify-between p-4 rounded-xl bg-slate-50 hover:bg-slate-100 transition-colors duration-200">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-xl gradient-royal flex items-center justify-center text-white font-bold text-sm">{emissao.ciaAerea?.substring(0,2)||'NA'}</div>
                                            <div>
                                                <p className="font-semibold text-navy-900">{emissao.nomePassageiro||'Sem nome'}</p>
                                                <p className="text-sm text-navy-500">{emissao.localizador} - {emissao.ciaAerea} - {emissao.qtdPassageiros} pax</p>
                                            </div>
                                        </div>
                                        <div className="text-right"><p className="font-bold text-navy-900">{formatCurrency(emissao.valorVenda||0)}</p><Badge status={emissao.statusPagamento}/></div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </Card>
                </div>
            );
        };

        const NovaEmissao=({onSave,editingEmissao,editingIndex})=>{
            const [formData,setFormData]=useState({
                localizador:'',ciaAerea:'LATAM',dataEmissao:new Date().toISOString().split('T')[0],dataViagem:'',
                qtdPassageiros:'1',nomePassageiro:'',dataNascimento:'',
                nomeCliente:'',cpfCnpj:'',emailCliente:'',telefoneCliente:'',
                fornecedor:'',
                custo:'',valorVenda:'',valorMilheiro:'',
                formaPagamento:'PIX',statusPagamento:'Pendente',observacoes:''
            });

            useEffect(()=>{
                if(editingEmissao){
                    setFormData(editingEmissao);
                }
            },[editingEmissao]);

            const lucro=useMemo(()=>{
                const custo=parseFloat(formData.custo)||0;
                const venda=parseFloat(formData.valorVenda)||0;
                return venda-custo;
            },[formData.custo,formData.valorVenda]);

            const handleChange=(field)=>(e)=>setFormData(prev=>({...prev,[field]:e.target.value}));

            const handleSubmit=(e)=>{
                e.preventDefault();
                onSave({...formData,lucro,id:editingEmissao?.id||Date.now()},editingIndex);
                setFormData({
                    localizador:'',ciaAerea:'LATAM',dataEmissao:new Date().toISOString().split('T')[0],dataViagem:'',
                    qtdPassageiros:'1',nomePassageiro:'',dataNascimento:'',
                    nomeCliente:'',cpfCnpj:'',emailCliente:'',telefoneCliente:'',
                    fornecedor:'',
                    custo:'',valorVenda:'',valorMilheiro:'',
                    formaPagamento:'PIX',statusPagamento:'Pendente',observacoes:''
                });
            };

            const formatCurrency=(value)=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(value);

            return(
                <div className="fade-in">
                    <div className="mb-8">
                        <h2 className="text-2xl font-bold text-navy-900">{editingEmissao?'Editar Emissao':'Nova Emissao'}</h2>
                        <p className="text-navy-500 mt-1">{editingEmissao?'Atualize os dados da venda':'Registre uma nova venda de passagem'}</p>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-6">

                        <Card className="p-6">
                            <div className="flex items-center gap-3 mb-6"><div className="w-10 h-10 rounded-xl gradient-royal flex items-center justify-center"><Icon name="plane" size={20} className="text-white"/></div><div><h3 className="font-semibold text-navy-900">Dados da Viagem</h3><p className="text-sm text-navy-500">Informacoes do voo</p></div></div>
                            <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                                <Input label="Localizador" value={formData.localizador} onChange={handleChange('localizador')} placeholder="ABC123" required/>

                        <Card className="p-6">

        const Financeiro=({emissoes,onDelete,onEdit})=>{
            const [filtroStatus,setFiltroStatus]=useState('todos');

            const formatCurrency=(value)=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(value||0);
            const formatDate=(dateString)=>dateString?new Date(dateString).toLocaleDateString('pt-BR'):'-';
            const emissoesFiltradas=useMemo(()=>emissoes.filter(e=>{const matchStatus=filtroStatus==='todos'||e.statusPagamento===filtroStatus;const matchBusca=!busca||e.nomeCliente?.toLowerCase().includes(busca.toLowerCase())||e.localizador?.toLowerCase().includes(busca.toLowerCase())||e.nomePassageiro?.toLowerCase().includes(busca.toLowerCase())||e.fornecedor?.toLowerCase().includes(busca.toLowerCase());return matchStatus&&matchBusca;}),[emissoes,filtroStatus,busca]);
            const totais=useMemo(()=>({vendas:emissoesFiltradas.reduce((acc,e)=>acc+(parseFloat(e.valorVenda)||0),0),lucro:emissoesFiltradas.reduce((acc,e)=>acc+(parseFloat(e.lucro)||0),0),passageiros:emissoesFiltradas.reduce((acc,e)=>acc+(parseInt(e.qtdPassageiros)||0),0)}),[emissoesFiltradas]);
            return(
                <div className="fade-in">

                    <Card className="p-4 mb-6">
                        <div className="flex flex-wrap items-center gap-4">
                            <div className="flex-1 min-w-[200px]">

                            </div>
                            <div className="flex items-center gap-2">
                                {['todos','Pago','Pendente'].map(status=>(<button key={status} onClick={()=>setFiltroStatus(status)} className={`px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300 ${filtroStatus===status?'gradient-royal text-white shadow-lg':'bg-slate-100 text-navy-600 hover:bg-slate-200'}`}>{status==='todos'?'Todos':status}</button>))}
                            </div>
                        </div>
                    </Card>
                    <div className="grid grid-cols-3 gap-4 mb-6">
                        <Card className="p-4 flex items-center gap-4"><div className="w-12 h-12 rounded-xl gradient-royal flex items-center justify-center"><Icon name="receipt" size={24} className="text-white"/></div><div><p className="text-sm text-navy-500">Total em Vendas</p><p className="text-xl font-bold text-navy-900">{formatCurrency(totais.vendas)}</p></div></Card>
                        <Card className="p-4 flex items-center gap-4"><div className="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center"><Icon name="piggyBank" size={24} className="text-white"/></div><div><p className="text-sm text-navy-500">Total de Lucro</p><p className={`text-xl font-bold ${totais.lucro>=0?'text-emerald-600':'text-red-600'}`}>{formatCurrency(totais.lucro)}</p></div></Card>
                        <Card className="p-4 flex items-center gap-4"><div className="w-12 h-12 rounded-xl bg-gradient-to-br from-violet-500 to-violet-600 flex items-center justify-center"><Icon name="users" size={24} className="text-white"/></div><div><p className="text-sm text-navy-500">Passageiros</p><p className="text-xl font-bold text-navy-900">{totais.passageiros}</p></div></Card>
                    </div>
                    <Card className="overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead><tr className="bg-slate-50 border-b border-navy-100"><th className="px-4 py-4 text-left text-xs font-semibold text-navy-600 uppercase tracking-wider">Data</th><th className="px-4 py-4 text-left text-xs font-semibold text-navy-600 uppercase tracking-wider">Cliente</th><th className="px-4 py-4 text-left text-xs font-semibold text-navy-600 uppercase tracking-wider">Fornecedor</th><th className="px-4 py-4 text-left text-xs font-semibold text-navy-600 uppercase tracking-wider">Cia</th><th className="px-4 py-4 text-left text-xs font-semibold text-navy-600 uppercase tracking-wider">Loc.</th><th className="px-4 py-4 text-center text-xs font-semibold text-navy-600 uppercase tracking-wider">Pax</th><th className="px-4 py-4 text-right text-xs font-semibold text-navy-600 uppercase tracking-wider">Venda</th><th className="px-4 py-4 text-right text-xs font-semibold text-navy-600 uppercase tracking-wider">Lucro</th><th className="px-4 py-4 text-center text-xs font-semibold text-navy-600 uppercase tracking-wider">Status</th><th className="px-4 py-4 text-center text-xs font-semibold text-navy-600 uppercase tracking-wider">Acoes</th></tr></thead>
                                <tbody className="divide-y divide-navy-100">
                                    {emissoesFiltradas.length===0?(
                                        <tr><td colSpan={10} className="px-6 py-12 text-center"><div className="flex flex-col items-center"><div className="w-16 h-16 rounded-2xl bg-navy-100 flex items-center justify-center mb-4"><Icon name="inbox" size={32} className="text-navy-400"/></div><p className="text-navy-500 font-medium">Nenhuma emissao encontrada</p><p className="text-navy-400 text-sm">Tente ajustar os filtros</p></div></td></tr>
                                    ):(
                                        emissoesFiltradas.map((emissao,index)=>(
                                            <tr key={emissao.id||index} className="table-row-hover transition-all duration-200">
                                                <td className="px-4 py-4"><span className="text-sm font-medium text-navy-900">{formatDate(emissao.dataEmissao)}</span></td>
                                                <td className="px-4 py-4"><div><p className="text-sm font-semibold text-navy-900">{emissao.nomeCliente||'-'}</p><p className="text-xs text-navy-500">{emissao.nomePassageiro}</p></div></td>
                                                <td className="px-4 py-4"><span className="text-sm text-navy-700">{emissao.fornecedor||'-'}</span></td>
                                                <td className="px-4 py-4"><span className="inline-flex items-center px-2.5 py-1 rounded-lg bg-navy-100 text-navy-700 text-xs font-semibold">{emissao.ciaAerea}</span></td>
                                                <td className="px-4 py-4"><span className="text-sm font-mono text-navy-700">{emissao.localizador}</span></td>
                                                <td className="px-4 py-4 text-center"><span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-royal-500/10 text-royal-600 text-sm font-bold">{emissao.qtdPassageiros||1}</span></td>
                                                <td className="px-4 py-4 text-right"><span className="text-sm font-semibold text-navy-900">{formatCurrency(emissao.valorVenda)}</span></td>
                                                <td className="px-4 py-4 text-right"><span className={`text-sm font-bold ${parseFloat(emissao.lucro)>=0?'text-emerald-600':'text-red-600'}`}>{formatCurrency(emissao.lucro)}</span></td>
                                                <td className="px-4 py-4 text-center"><Badge status={emissao.statusPagamento}/></td>
                                                <td className="px-4 py-4"><div className="flex items-center justify-center gap-2"><button onClick={()=>onEdit(emissoes.findIndex(e=>e.id===emissao.id))} className="p-2 rounded-lg text-navy-400 hover:text-royal-500 hover:bg-royal-50 transition-all duration-200" title="Editar"><Icon name="pencil" size={16}/></button><button onClick={()=>onDelete(emissoes.findIndex(e=>e.id===emissao.id))} className="p-2 rounded-lg text-navy-400 hover:text-red-500 hover:bg-red-50 transition-all duration-200" title="Excluir"><Icon name="trash" size={16}/></button></div></td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        };

        const Backup=({emissoes,onImport,lastSaved})=>{
            const fileInputRef=useRef(null);

            const formatDate=(date)=>{
                return new Date(date).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
            };

            const handleExport=()=>{
                const data={
                    version:'1.0',
                    exportDate:new Date().toISOString(),
                    totalEmissoes:emissoes.length,
                    emissoes:emissoes
                };
                const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
                const url=URL.createObjectURL(blob);
                const a=document.createElement('a');
                a.href=url;
                a.download=`flight-finance-backup-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleImportClick=()=>{
                fileInputRef.current?.click();
            };

            const handleFileChange=(e)=>{
                const file=e.target.files?.[0];
                if(!file)return;

                const reader=new FileReader();
                reader.onload=(event)=>{
                    try{
                        const data=JSON.parse(event.target?.result);
                        if(data.emissoes&&Array.isArray(data.emissoes)){
                            if(confirm(`Importar ${data.emissoes.length} emissoes? Isso vai SUBSTITUIR todos os dados atuais.`)){
                                onImport(data.emissoes);
                            }
                        }else{
                            alert('Arquivo invalido. Certifique-se de que e um backup do Flight Finance.');
                        }
                    }catch(err){
                        alert('Erro ao ler o arquivo. Verifique se e um JSON valido.');
                    }
                };
                reader.readAsText(file);
                e.target.value='';
            };

            const stats=useMemo(()=>{
                const totalVendas=emissoes.reduce((acc,e)=>acc+(parseFloat(e.valorVenda)||0),0);
                const totalLucro=emissoes.reduce((acc,e)=>acc+(parseFloat(e.lucro)||0),0);
                const totalPax=emissoes.reduce((acc,e)=>acc+(parseInt(e.qtdPassageiros)||0),0);
                return{totalVendas,totalLucro,totalPax};
            },[emissoes]);

            const formatCurrency=(value)=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(value);

            return(
                <div className="fade-in">
                    <div className="mb-8"><h2 className="text-2xl font-bold text-navy-900">Backup e Restauracao</h2><p className="text-navy-500 mt-1">Gerencie seus dados com seguranca</p></div>

                    <Card className="p-6 mb-6">
                        <div className="flex items-center gap-4 mb-6">
                            <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center">
                                <Icon name="shield" size={24} className="text-white"/>
                            </div>
                            <div>
                                <h3 className="font-semibold text-navy-900">Status do Sistema</h3>
                                <p className="text-sm text-emerald-600 flex items-center gap-1">
                                    <Icon name="checkCircle" size={14}/>
                                    Auto-save ativo (LocalStorage)
                                </p>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 p-4 bg-slate-50 rounded-xl">
                            <div>
                                <p className="text-xs text-navy-500 uppercase tracking-wider">Total de Registros</p>
                                <p className="text-2xl font-bold text-navy-900">{emissoes.length}</p>
                            </div>
                            <div>
                                <p className="text-xs text-navy-500 uppercase tracking-wider">Total em Vendas</p>
                                <p className="text-2xl font-bold text-navy-900">{formatCurrency(stats.totalVendas)}</p>
                            </div>
                            <div>
                                <p className="text-xs text-navy-500 uppercase tracking-wider">Lucro Total</p>
                                <p className={`text-2xl font-bold ${stats.totalLucro>=0?'text-emerald-600':'text-red-600'}`}>{formatCurrency(stats.totalLucro)}</p>
                            </div>
                            <div>
                                <p className="text-xs text-navy-500 uppercase tracking-wider">Passageiros</p>
                                <p className="text-2xl font-bold text-navy-900">{stats.totalPax}</p>
                            </div>
                        </div>

                        {lastSaved&&(
                            <p className="text-xs text-navy-400 mt-4">
                                Ultimo salvamento automatico: {formatDate(lastSaved)}
                            </p>
                        )}
                    </Card>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <Card className="p-6" hover>
                            <div className="flex items-center gap-4 mb-4">
                                <div className="w-12 h-12 rounded-xl gradient-royal flex items-center justify-center">
                                    <Icon name="download" size={24} className="text-white"/>
                                </div>
                                <div>
                                    <h3 className="font-semibold text-navy-900">Exportar Backup</h3>
                                    <p className="text-sm text-navy-500">Baixe seus dados em JSON</p>
                                </div>
                            </div>
                            <p className="text-sm text-navy-600 mb-6">
                                Faca o download de todos os seus dados para salvar no Google Drive, pendrive ou onde preferir. Recomendamos fazer backup regularmente.
                            </p>
                            <Button variant="primary" size="lg" icon="download" onClick={handleExport} className="w-full">
                                Baixar Backup JSON
                            </Button>
                        </Card>

                        <Card className="p-6" hover>
                            <div className="flex items-center gap-4 mb-4">
                                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-500 to-amber-600 flex items-center justify-center">
                                    <Icon name="upload" size={24} className="text-white"/>
                                </div>
                                <div>
                                    <h3 className="font-semibold text-navy-900">Importar Backup</h3>
                                    <p className="text-sm text-navy-500">Restaure dados de um arquivo</p>
                                </div>
                            </div>
                            <p className="text-sm text-navy-600 mb-6">
                                Carregue um arquivo de backup previamente exportado. <span className="text-red-500 font-medium">Atencao: isso vai substituir todos os dados atuais!</span>
                            </p>
                            <input type="file" ref={fileInputRef} onChange={handleFileChange} accept=".json" className="hidden"/>
                            <Button variant="warning" size="lg" icon="upload" onClick={handleImportClick} className="w-full">
                                Importar Arquivo JSON
                            </Button>
                        </Card>
                    </div>

                    <Card className="p-6 mt-6">
                        <div className="flex items-center gap-3 mb-4">
                            <Icon name="info" size={20} className="text-royal-500"/>
                            <h3 className="font-semibold text-navy-900">Dicas de Backup</h3>
                        </div>
                        <ul className="space-y-2 text-sm text-navy-600">
                            <li className="flex items-start gap-2">
                                <Icon name="check" size={16} className="text-emerald-500 mt-0.5 flex-shrink-0"/>
                                <span>Seus dados sao salvos automaticamente no navegador (LocalStorage)</span>
                            </li>
                            <li className="flex items-start gap-2">
                                <Icon name="check" size={16} className="text-emerald-500 mt-0.5 flex-shrink-0"/>
                                <span>Exporte o backup e salve na pasta do Google Drive para sincronizar automaticamente</span>
                            </li>
                            <li className="flex items-start gap-2">
                                <Icon name="check" size={16} className="text-emerald-500 mt-0.5 flex-shrink-0"/>
                                <span>Faca backup pelo menos uma vez por semana ou apos vendas importantes</span>
                            </li>
                            <li className="flex items-start gap-2">
                                <Icon name="alertCircle" size={16} className="text-amber-500 mt-0.5 flex-shrink-0"/>
                                <span>Se limpar os dados do navegador, voce perdera os dados locais. Sempre tenha um backup externo!</span>
                            </li>
                        </ul>
                    </Card>
                </div>
            );
        };

        const App=()=>{
            const [currentPage,setCurrentPage]=useState('dashboard');
            const [emissoes,setEmissoes]=useState(()=>{
                const saved=localStorage.getItem('flight-finance-emissoes-v2');
                return saved?JSON.parse(saved):[];
            });
            const [notification,setNotification]=useState(null);
            const [lastSaved,setLastSaved]=useState(null);
            const [editingIndex,setEditingIndex]=useState(null);

            useEffect(()=>{
                localStorage.setItem('flight-finance-emissoes-v2',JSON.stringify(emissoes));
                setLastSaved(new Date().toISOString());
            },[emissoes]);

            const showNotification=(message,type='success')=>{
                setNotification({message,type});
                setTimeout(()=>setNotification(null),3000);
            };

            const handleSaveEmissao=(emissao,index)=>{
                if(index!==null&&index!==undefined){
                    const newEmissoes=[...emissoes];
                    newEmissoes[index]=emissao;
                    setEmissoes(newEmissoes);
                    showNotification('Emissao atualizada com sucesso!');
                    setEditingIndex(null);
                }else{
                    setEmissoes(prev=>[...prev,emissao]);
                    showNotification('Emissao salva com sucesso!');
                }
                setCurrentPage('financeiro');
            };

            const handleDeleteEmissao=(index)=>{
                if(confirm('Tem certeza que deseja excluir esta emissao?')){
                    setEmissoes(prev=>prev.filter((_,i)=>i!==index));
                    showNotification('Emissao excluida!','warning');
                }
            };

            const handleEditEmissao=(index)=>{
                setEditingIndex(index);
                setCurrentPage('nova-emissao');
            };

            const handleImport=(data)=>{
                setEmissoes(data);
                showNotification(`${data.length} emissoes importadas com sucesso!`);
            };

            const renderPage=()=>{
                switch(currentPage){
                    case'dashboard':return<Dashboard emissoes={emissoes}/>;
                    case'nova-emissao':return<NovaEmissao onSave={handleSaveEmissao} editingEmissao={editingIndex!==null?emissoes[editingIndex]:null} editingIndex={editingIndex}/>;
                    case'financeiro':return<Financeiro emissoes={emissoes} onDelete={handleDeleteEmissao} onEdit={handleEditEmissao}/>;
                    case'backup':return<Backup emissoes={emissoes} onImport={handleImport} lastSaved={lastSaved}/>;
                    default:return<Dashboard emissoes={emissoes}/>;
                }
            };

            return(
                <div className="min-h-screen bg-slate-50">
                    <Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage}/>
                    <main className="ml-64 p-8"><div className="max-w-6xl mx-auto">{renderPage()}</div></main>
                    {notification&&(
                        <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-xl flex items-center gap-3 slide-in ${notification.type==='success'?'bg-emerald-500':notification.type==='warning'?'bg-amber-500':'bg-royal-500'} text-white`}>
                            <Icon name={notification.type==='success'?'checkCircle':notification.type==='warning'?'alertCircle':'info'} size={20}/>
                            <span className="font-medium">{notification.message}</span>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App/>,document.getElementById('app'));
    </script>
</body>
</html>
